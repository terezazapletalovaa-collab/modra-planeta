  <!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Mapa světa s přáteli</title>

<style>
  body {
    margin: 0;
    font-family: "Arial", Arial, sans-serif;
    background-color: #eaf6ff;
    text-align: center;
  }

  h1 {
    color: #2c3e50;
    margin: 15px;
  }

  .map-wrapper {
    position: relative;
    display: inline-block;
  }

  .map-img {
    max-width: 900px;
    width: 90vw;
    border-radius: 15px;
    border: 4px solid #fff;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  .pin {
    position: absolute;
    transform: translate(-50%, -100%);
    cursor: pointer;
    text-align: center;
  }

  .pin-icon {
    font-size: 28px;
  }

  .pin-card {
    display: none;
    background: white;
    padding: 6px 10px;
    border-radius: 8px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    margin-top: 4px;
    font-size: 14px;
    min-width: 80px;
  }

  .pin:hover .pin-card {
    display: block;
  }
</style>

</head>

<body>

<h1>🌏 Moji kamarádi na mapě světa</h1>

<div class="map-wrapper">
  <!-- Pozadí mapy -->
  <img src="https://i.postimg.cc/50rLPnLx/299757.webp">

  <!-- Špendlíky -->

  <!-- 1) Toronto, Kanada -->
  <a href="https://sites.google.com/view/john-toronto/domovsk%C3%A1-str%C3%A1nka" class="pin" 
   style="left: 15%; top: 25%; text-decoration:none; color:inherit;">
    <div class="pin-icon">📍</div>
    <div class="pin-card">
      🪶<br>
      <strong>John</strong><br>
      6:00
    </div>
  </div>

  
  <!-- 2) Rio, Brazílie -->
  <a href="https://sites.google.com/view/noemi-rio/domovsk%C3%A1-str%C3%A1nka" class="pin" 
   style="left: 39%; top: 70%; text-decoration:none; color:inherit;">
    <div class="pin-icon">📍</div>
    <div class="pin-card">
      💃🏻<br>
      <strong>Noemi</strong><br>
      8:00
    </div>
  </div>

    <!-- 3) Grónsko -->
  <a href="https://sites.google.com/view/nivi-gronsko/domovsk%C3%A1-str%C3%A1nka" class="pin" 
   style="left: 43%; top: 25%; text-decoration:none; color:inherit;">
    <div class="pin-icon">📍</div>
    <div class="pin-card">
      🐻‍❄️<br>
      <strong>Nivi</strong><br>
      9:00
    </div>
  </div>

       <!-- 4) Chorvatsko -->
  <a href="https://sites.google.com/view/nivi-gronsko/domovsk%C3%A1-str%C3%A1nka" class="pin" 
   style="left: 52%; top: 40%; text-decoration:none; color:inherit;">
    <div class="pin-icon">📍</div>
    <div class="pin-card">
      🌊<br>
      <strong>Stjepan</strong><br>
      12:00
    </div>
  </div>
</div>

</body>
</html>
    
  </body>
  
</html>
